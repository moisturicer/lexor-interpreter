<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>LEXOR Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
    <div class="logo">
        <span class="logo-bracket">{</span>
        <span class="logo-text">LEXOR</span>
        <span class="logo-bracket">}</span>
    </div>
    <div class="tagline">playground</div>
    <div class="header-right">
        <select id="example-select">
            <option value="">load example…</option>
            <option value="hello">hello world</option>
            <option value="arithmetic">arithmetic</option>
            <option value="logical">logical</option>
            <option value="ifelse">if / else</option>
            <option value="loop">repeat loop</option>
        </select>
        <button id="run-btn">
            <span class="run-icon">▶</span>
            <span>Run</span>
        </button>
    </div>
</header>

<main>
    <div class="pane pane-editor">
        <div class="pane-label">
            <span class="dot dot-green"></span>
            editor
            <span class="pane-hint">Ctrl+Enter to run</span>
        </div>
        <div id="editor"></div>
    </div>

    <div class="divider" id="divider"></div>

    <div class="pane pane-right">
        <div class="pane pane-output" id="pane-output">
            <div class="pane-label">
                <span class="dot dot-blue"></span>
                output
            </div>
            <pre id="output-area"><span class="placeholder">// run your program to see output here</span></pre>
        </div>

        <div class="pane pane-input" id="pane-input">
            <div class="pane-label">
                <span class="dot dot-yellow"></span>
                stdin
                <span class="pane-hint">comma-separated for multiple SCAN values</span>
            </div>
            <textarea id="input-area" placeholder="e.g. 42, hello"></textarea>
        </div>
    </div>
</main>

<footer>
    <span id="status-msg">ready</span>
    <span class="footer-right">LEXOR interpreter · SHS Programming Language</span>
</footer>

<!-- Monaco loader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script src="lexor.monarch.js"></script>
<script src="app.js"></script>
</body>
</html>
